<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>akvtr</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      max-width: 480px;
      width: 100%;
      padding: 2.5rem;
      border: 1px solid #30363d;
      border-radius: 12px;
      background: #161b22;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #21262d;
      border: 2px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.5rem;
      color: #f0f6fc;
      margin-bottom: 0.25rem;
    }

    .handle {
      font-size: 0.95rem;
      color: #8b949e;
      margin-bottom: 1rem;
    }

    .bio {
      font-size: 0.95rem;
      line-height: 1.65;
      color: #c9d1d9;
      margin-bottom: 1.5rem;
    }

    .links {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .links a {
      display: inline-block;
      padding: 0.4rem 1rem;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      text-decoration: none;
      font-size: 0.875rem;
      transition: border-color 0.15s, color 0.15s;
    }

    .links a:hover {
      border-color: #58a6ff;
      color: #58a6ff;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👤</div>
    <h1>akvtr</h1>
    <p class="handle">@akvtr</p>
    <p class="bio">
      Software developer interested in AI, systems, and the web.
    </p>
    <div class="links">
      <a href="https://github.com/akvtr" target="_blank" rel="noopener">GitHub</a>
    </div>
  </div>
</body>
</html>
